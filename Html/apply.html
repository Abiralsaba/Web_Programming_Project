<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application - MAMA-KHALU.COM</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/apply.css">
</head>
<body>

  <nav class="glass-nav">
    <div class="container navbar">
      <a href="index.html" class="logo">MAMA<span>KHALU</span></a>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="container mt-5 mb-5 apply-wrapper">
    
    <div class="mb-4 text-center">
      <span class="badge badge-success mb-2">✓ Assessment Passed (100%)</span>
      <h1 class="mb-1">Submit Application</h1>
      <p class="text-muted">You're applying for the selected role.</p>
    </div>

    <div class="glass-card-static slide-up">
      <form onsubmit="event.preventDefault(); alert('Application Submitted Successfully!'); window.location.href='dashboard.html';">
        
        <div class="grid-2 mb-3">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" value="John" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" value="Doe" required>
          </div>
        </div>

        <div class="form-group mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" value="john.doe@example.com" required>
        </div>

        <div class="form-group mb-4">
          <label class="form-label">Resume / CV</label>
          <div class="upload-zone">
            <div class="upload-icon">📄</div>
            <p class="font-medium mb-1">Click to upload or drag and drop</p>
            <p class="text-muted text-sm">PDF, DOCX up to 5MB</p>
          </div>
        </div>

        <div class="form-group mb-4">
          <label class="form-label">Cover Letter (Optional)</label>
          <textarea class="form-input" rows="4" placeholder="Tell the company why you're a great fit..."></textarea>
        </div>

        <div class="flex-between">
          <a href="dashboard.html" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">Submit Application</button>
        </div>

      </form>
    </div>

  </main>

  <script src="../JS/script.js"></script>
</body>
</html>
