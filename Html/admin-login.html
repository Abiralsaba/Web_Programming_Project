<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - MAMA-KHALU.COM</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/admin-login.css">
</head>
<body class="admin-login-body">

  <!-- Background Decor -->
  <div class="admin-login-decor-top"></div>
  <div class="admin-login-decor-bottom"></div>

  <div class="glass-card animate-fade-in admin-login-card">
    <div class="text-center mb-4">
      <a href="index.html" class="logo flex-center mb-2 admin-logo-center">MAMA<span>KHALU</span></a>
      <div class="badge mb-2 admin-badge">Admin Portal</div>
    </div>
    
    <form onsubmit="event.preventDefault(); window.location.href='admin-dashboard.html';">
      <div class="form-group">
        <label class="form-label" for="email">Admin Email</label>
        <input type="email" id="email" class="form-input" placeholder="admin@mama-khalu.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary mt-2 admin-login-btn">Access Secure Portal</button>
    </form>
    
    <div class="text-center mt-4 pt-4 admin-back-link-container">
      <a href="login.html" class="text-light admin-back-link">← Back to Applicant Login</a>
    </div>
  </div>

</body>
</html>
